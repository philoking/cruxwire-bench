<div class="panel">
  <h3 style="margin-top:0">{{ day }} <span class="pill">{{ total }} stories</span></h3>
  <p class="muted">Pick a span: the smallest unit is one 2-hour block; expand up to the full day,
     which faithfully reproduces what the reader accumulated.</p>

  <div class="row" style="margin-bottom:10px">
    {% for b in blocks %}
      <span class="pill">{{ b.block_id }} · {{ b.story_count }}</span>
    {% endfor %}
  </div>

  <form hx-get="/window" hx-target="#window" hx-swap="innerHTML" class="row">
    <label>start
      <select name="start">
        {% for b in blocks %}<option value="{{ b.block_id }}">{{ b.block_id }}</option>{% endfor %}
      </select>
    </label>
    <label>end
      <select name="end">
        {% for b in blocks %}<option value="{{ b.block_id }}" {% if loop.last %}selected{% endif %}>{{ b.block_id }}</option>{% endfor %}
      </select>
    </label>
    <label>threshold
      <input type="number" name="threshold" value="0.82" step="0.01" min="0" max="1" style="width:80px">
    </label>
    <input type="hidden" name="day" value="{{ day }}">
    <button type="submit">Cluster span</button>
  </form>
</div>

<div id="window"></div>
